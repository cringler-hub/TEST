name: Deploy to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Staging-Ordner mit gefilterten Dateien anlegen
        run: |
          mkdir -p _deploy
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='_deploy' \
            --exclude='install.php' \
            --exclude='BENUTZERHANDBUCH.md' \
            --exclude='RELEASE_NOTES.md' \
            --exclude='DEPLOY_IONOS.md' \
            --exclude='*.log' \
            --exclude='.env*' \
            ./ _deploy/

      - name: SFTP-Deploy zu IONOS
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: './_deploy/*'
          remote_path: ${{ secrets.FTP_SERVER_DIR }}
          sftp_only: true
          delete_remote_files: false
